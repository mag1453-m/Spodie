# ─────────────────────────────────────────────
# SPODIE — Netlify yapılandırması
# Next.js'i Netlify'da çalıştırmak için resmi plugin kullanılır.
# Takip (cron) Netlify'da DEĞİL — Supabase pg_cron ile yapılır.
# ─────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
